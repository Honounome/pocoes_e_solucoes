<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração - Poções e Soluções</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

    <header>
        <h1>Painel de Administração</h1>
        <p>Criação, listagem e exclusão de poções</p>
        <a href="index.html">Voltar para a Loja</a>
    </header>

    <section id="container-cadastro" class="section-container">
        <h2>Cadastrar Nova Poção</h2>
        <form id="form-cadastro">
            <div class="form-group">
                <label for="nome">Nome da Poção:</label><br>
                <input type="text" id="nome" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="descricao">Descrição:</label><br>
                <textarea id="descricao" class="form-input" required></textarea>
            </div>
            <div class="form-group">
                <label for="imagem">URL da Imagem:</label><br>
                <input type="url" id="imagem" class="form-input" placeholder="https://exemplo.com/foto.png" required>
            </div>
            <div class="form-group">
                <label for="preco">Preço (em moedas):</label><br>
                <input type="number" id="preco" class="form-input" step="0.01" required>
            </div>
            <button type="submit" class="btn-submit">Cadastrar Poção</button>
        </form>
    </section>

    <section id="container-lista-admin">
        <h2>Poções Cadastradas</h2>
        <div id="lista-potions-admin"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
